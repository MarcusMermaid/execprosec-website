<style>
  :root{--navy:#041440;--white:#ffffff;--gold:#DDBC66;--salmon:#D64045}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--white);
       min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
       text-align:center;padding:32px;overflow:hidden;-webkit-font-smoothing:antialiased}
  body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.4;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E")}
  .wrap{position:relative;z-index:2;max-width:560px}
  .logo{height:66px;width:auto;display:block;margin:0 auto 42px}
  .eyebrow{font-size:10px;letter-spacing:.2em;text-transform:uppercase;font-weight:700;color:var(--salmon);
           display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:22px}
  .eyebrow::before,.eyebrow::after{content:'';width:28px;height:1px;background:var(--salmon)}
  h1{font-family:'DM Serif Display',serif;font-size:clamp(30px,5vw,52px);line-height:1.15;
     letter-spacing:-.01em;margin-bottom:18px;text-shadow:0 1px 3px rgba(0,0,0,.3)}
  h1 em{font-style:italic;color:var(--gold)}
  .rule{width:48px;height:2px;background:var(--gold);margin:0 auto 22px}
  p{font-size:16px;line-height:1.7;color:rgba(255,255,255,.62);font-weight:300}
  footer{position:fixed;bottom:22px;left:0;right:0;z-index:2;font-size:11px;letter-spacing:.14em;
         text-transform:uppercase;color:rgba(255,255,255,.3)}
</style>
